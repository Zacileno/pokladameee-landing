<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pokládámeee.cz – Vinylové podlahy v MSK</title>
<meta name="description" content="Profesionální pokládka vinylových podlah v Moravskoslezském kraji. Zaměření zdarma, hotovo do týdne.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',system-ui,sans-serif;min-height:100vh;background:#111;color:white;overflow-x:hidden}

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:48px 24px;
}

/* Vinyl plank pokládka — záběr shora na ruce a podlahu */
.bg{
  position:absolute;inset:0;
  background-image:url('https://images.pexels.com/photos/4263067/pexels-photo-4263067.jpeg?auto=compress&cs=tinysrgb&w=1800');
  background-size:cover;
  background-position:center 30%;
  z-index:0;
}
.bg::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(
    160deg,
    rgba(10,10,10,0.78) 0%,
    rgba(21,50,100,0.65) 50%,
    rgba(10,10,10,0.82) 100%
  );
}

.content{
  position:relative;z-index:1;max-width:700px;width:100%;
  display:flex;flex-direction:column;align-items:center;
}
.logo{height:50px;width:auto;margin-bottom:52px;filter:drop-shadow(0 2px 16px rgba(0,0,0,0.5))}

.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,136,0,0.18);border:1px solid rgba(255,136,0,0.4);
  border-radius:100px;padding:6px 18px;margin-bottom:28px;
  font-size:13px;font-weight:700;color:#FF8800;
  letter-spacing:.07em;text-transform:uppercase;backdrop-filter:blur(6px);
}
.dot{width:7px;height:7px;background:#FF8800;border-radius:50%;display:inline-block}

h1{font-size:clamp(50px,8.5vw,94px);font-weight:900;line-height:1.0;margin-bottom:20px;letter-spacing:-.02em;text-shadow:0 2px 24px rgba(0,0,0,0.6);text-align:center}
.o{color:#FF8800}

.sub{font-size:clamp(16px,2.3vw,20px);color:rgba(255,255,255,.72);line-height:1.7;margin-bottom:52px;max-width:520px;text-align:center}

.contacts{display:flex;flex-direction:column;gap:14px;align-items:center;margin-bottom:52px}
a{text-decoration:none;transition:transform .18s,filter .18s}
a:hover{transform:translateY(-3px);filter:brightness(1.1)}

.pill{display:inline-flex;align-items:center;gap:14px;padding:15px 32px;border-radius:100px;font-weight:800;letter-spacing:.01em}
.ph{background:#FF8800;color:white;font-size:clamp(19px,2.8vw,26px);box-shadow:0 8px 32px rgba(255,136,0,0.4)}
.em{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);color:white;font-size:clamp(14px,2.2vw,18px);backdrop-filter:blur(10px)}

.stats{display:flex;justify-content:center;gap:48px;flex-wrap:wrap;margin-top:52px;padding-top:40px;border-top:1px solid rgba(255,255,255,.12);width:100%;text-align:center}
.sn{font-size:clamp(26px,4vw,36px);font-weight:900;color:#FF8800;line-height:1;display:block}
.sl{font-size:13px;color:rgba(255,255,255,.45);margin-top:6px;display:block;letter-spacing:.02em}

.foot{position:absolute;bottom:22px;font-size:12px;color:rgba(255,255,255,.2);letter-spacing:.04em}

@media(max-width:640px){
  .hero{padding:36px 16px 60px}
  .logo{height:38px;margin-bottom:36px}
  .badge{font-size:11px;padding:5px 14px}
  .sub{margin-bottom:36px}
  .contacts{gap:10px;margin-bottom:36px}
  .pill{padding:13px 22px}
  .ph{font-size:clamp(17px,5vw,22px)}
  .em{font-size:13px}
  .stats{gap:0;margin-top:36px;padding-top:28px;display:grid;grid-template-columns:1fr 1fr;row-gap:24px}
  .stats>div:last-child{grid-column:1/-1;text-align:center}
  .sn{font-size:clamp(22px,6vw,30px)}
  .sl{font-size:12px}
}

@media(max-width:380px){
  .stats{grid-template-columns:1fr}
  .stats>div:last-child{grid-column:auto}
  h1{letter-spacing:-.03em}
}
</style>
</head>
